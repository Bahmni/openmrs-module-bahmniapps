<patient-context patient="patient" show-name-and-image="tabBeingPrinted.printing.showNameAndImage" class="dashboard-consultation" is-consultation="!stateChange()"></patient-context>

<div ng-if="enableFormDraftFeature && stateChange() && formDraft.hasDrafts" class="bx--inline-notification bx--inline-notification--info draft-notification" role="status">
    <div class="bx--notification__details">
        <div class="bx--notification__icon">ℹ</div>
        <div class="bx--notification__text-wrapper">
            <h3 class="bx--notification__title">{{ 'FORMS_DRAFT_BANNER_TITLE' | translate }}</h3>
            <p class="bx--notification__subtitle">{{ 'FORMS_DRAFT_BANNER_SUBTITLE' | translate: {draftDate: formDraft.draftDate, draftTime: formDraft.draftTime} }}</p>
        </div>
    </div>
    <div class="bx--notification__action-button">
        <button class="draft-action-button draft-resume-button" ng-click="resumeDraft()">{{ 'RESUME' | translate }}</button>
        <button class="draft-action-button draft-discard-button">{{ 'DISCARD_DRAFT' | translate }}</button>
    </div>
</div>

<dashboard ng-show ="stateChange()" patient="::patient" config="::isDashboardPrinting ? tabBeingPrinted : clinicalDashboardConfig.currentTab"
           disease-templates="diseaseTemplates" section-groups="sectionGroups" visit-history="visitHistory"
           active-visit-uuid="visitHistory.activeVisit.uuid" visit-summary="visitSummary" enrollment="enrollment" active-encounter-uuid="::consultation.encounterUuid">
</dashboard>
<div ng-show ="!stateChange()" ui-view="consultation-content" class="consultation-content"></div>
